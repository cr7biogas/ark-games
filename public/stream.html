<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARK Games - STREAM</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #000;
      color: #fff;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }
    
    /* Video a tutto schermo - Canvas GPU pipeline */
    .video-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      contain: layout style;
    }

    .stream-canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
      opacity: 0;
      will-change: opacity, transform;
      transform: translateZ(0);
      image-rendering: auto;
    }

    .stream-canvas.visible {
      opacity: 1;
    }

    .no-signal {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #666;
      z-index: 2;
    }

    .no-signal img {
      max-width: 60%;
      max-height: 60vh;
      border-radius: 20px;
      margin-bottom: 20px;
    }

    .stream-badge {
      position: fixed;
      bottom: 8px;
      left: 8px;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: bold;
      font-family: monospace;
      z-index: 100;
      opacity: 0.5;
      pointer-events: none;
    }
    .stream-badge.mjpeg { background: #2ecc71; color: #000; }
    .stream-badge.snapshot { background: #f39c12; color: #000; }
    .stream-badge.offline { background: #e74c3c; color: #fff; }
    
    /* ===== OVERLAY ===== */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    
    .overlay.hidden { opacity: 0; }
    
    /* Top Bar */
    .top-bar {
      position: absolute;
      top: 20px;
      left: 20px;
      right: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .logo {
      background: rgba(0,0,0,0.9);
      padding: 2vh 3vw;
      border-radius: 1.5vh;
      font-size: clamp(20px, 5vw, 42px);
      font-weight: bold;
      border: 3px solid #FF6B35;
      box-shadow: 0 0 20px rgba(255,107,53,0.5);
    }
    
    .logo span { color: #FF6B35; text-shadow: 0 0 10px #FF6B35; }
    
    .wod-name {
      background: linear-gradient(135deg, #FF6B35, #FF8C00);
      padding: 2vh 3vw;
      border-radius: 1.5vh;
      font-size: clamp(18px, 4vw, 36px);
      font-weight: bold;
      box-shadow: 0 0 25px rgba(255,107,53,0.7);
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }
    
    /* Timer centrale in basso */
    .timer-container {
      position: absolute;
      bottom: 3vh;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
    }
    
    .timer {
      font-size: clamp(60px, 18vw, 150px);
      font-weight: bold;
      font-family: 'Courier New', monospace;
      text-shadow: 0 0 30px rgba(255,255,255,0.8), 4px 4px 8px rgba(0,0,0,0.9);
      color: #fff;
      background: rgba(0,0,0,0.7);
      padding: 1vh 4vw;
      border-radius: 2vh;
      border: 3px solid #fff;
    }
    
    .timer.countdown { 
      color: #FFD700; 
      border-color: #FFD700;
      text-shadow: 0 0 40px #FFD700, 4px 4px 8px rgba(0,0,0,0.9);
    }
    .timer.running { 
      color: #00FF7F; 
      border-color: #00FF7F;
      text-shadow: 0 0 40px #00FF7F, 4px 4px 8px rgba(0,0,0,0.9);
    }
    .timer.stopped { 
      color: #fff; 
      border-color: #666;
    }
    .timer.timecap { 
      color: #FF4444; 
      border-color: #FF4444;
      text-shadow: 0 0 40px #FF4444, 4px 4px 8px rgba(0,0,0,0.9);
      animation: pulse 0.5s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    
    .timer-label {
      font-size: clamp(16px, 3vw, 28px);
      color: #fff;
      margin-top: 1vh;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
      font-weight: bold;
    }
    
    /* Lane info in basso */
    .lanes-bar {
      position: absolute;
      bottom: 18vh;
      left: 2vw;
      right: 2vw;
      display: flex;
      justify-content: center;
      gap: 2vw;
    }
    
    .lane-card {
      background: rgba(0,0,0,0.9);
      border: 3px solid #FF6B35;
      border-radius: 2vh;
      padding: 2vh 3vw;
      min-width: 20vw;
      text-align: center;
      box-shadow: 0 0 20px rgba(255,107,53,0.4);
    }
    
    .lane-card.active { 
      border-color: #00FF7F; 
      background: rgba(0,255,127,0.15); 
      box-shadow: 0 0 30px rgba(0,255,127,0.6);
    }
    
    .lane-number {
      font-size: clamp(12px, 2vw, 20px);
      color: #FF6B35;
      margin-bottom: 0.5vh;
      font-weight: bold;
      text-transform: uppercase;
    }
    
    .team-name {
      font-size: clamp(14px, 2.5vw, 28px);
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
    }
    
    .team-emoji {
      font-size: clamp(30px, 6vw, 60px);
      display: block;
      margin-bottom: 0.5vh;
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));
    }
    
    .team-score {
      font-size: clamp(20px, 4vw, 40px);
      color: #FFD700;
      font-weight: bold;
      margin-top: 0.5vh;
      text-shadow: 0 0 15px #FFD700;
    }
    
    /* Camera name badge */
    .camera-badge {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(0,0,0,0.8);
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 16px;
      border: 2px solid #FF6B35;
      z-index: 5;
    }
  </style>
</head>
<body>

  <!-- Video Camera - Canvas GPU Pipeline -->
  <div class="video-container">
    <canvas id="canvasA" class="stream-canvas"></canvas>
    <canvas id="canvasB" class="stream-canvas"></canvas>
    <!-- MJPEG source nascosto - il browser riceve lo stream qui -->
    <img id="mjpegSrc" style="position:absolute;width:0;height:0;opacity:0;pointer-events:none;" />
    <div class="no-signal" id="noSignal">
      <div style="font-size: 80px; margin-bottom: 20px;">🐾</div>
      <div style="font-size: 48px; font-weight: bold; color: #FF6B35;">ARK GAMES 2026</div>
      <div style="font-size: 24px; margin-top: 20px; color: #888;">In attesa della camera...</div>
    </div>
  </div>
  <div class="stream-badge offline" id="streamBadge">OFF</div>
  
  <!-- Overlay (solo se attivato dalla regia) -->
  <div class="overlay hidden" id="overlay">
    <div class="top-bar">
      <div class="logo">🐾 <span>ARK</span> GAMES</div>
      <div class="wod-name" id="wodName">In attesa...</div>
    </div>
    
    <div class="lanes-bar" id="lanesBar">
      <div class="lane-card" id="lane1">
        <div class="lane-number">LANE 1</div>
        <span class="team-emoji" id="emoji1">🐾</span>
        <div class="team-name" id="team1">-</div>
        <div class="team-score" id="score1"></div>
      </div>
      <div class="lane-card" id="lane2">
        <div class="lane-number">LANE 2</div>
        <span class="team-emoji" id="emoji2">🐾</span>
        <div class="team-name" id="team2">-</div>
        <div class="team-score" id="score2"></div>
      </div>
      <div class="lane-card" id="lane3">
        <div class="lane-number">LANE 3</div>
        <span class="team-emoji" id="emoji3">🐾</span>
        <div class="team-name" id="team3">-</div>
        <div class="team-score" id="score3"></div>
      </div>
    </div>
    
    <div class="timer-container">
      <div class="timer stopped" id="timer">00:00</div>
      <div class="timer-label" id="timerLabel">🐾 ARK GAMES 2026</div>
    </div>
  </div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getDatabase, ref, onValue } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyAL7evRkNPomJv3Bca2LjLqCawu_j3S5Rc",
  authDomain: "copilota-6d94a.firebaseapp.com",
  databaseURL: "https://copilota-6d94a-default-rtdb.firebaseio.com",
  projectId: "copilota-6d94a"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const noSignal = document.getElementById('noSignal');
const overlayEl = document.getElementById('overlay');
const canvasA = document.getElementById('canvasA');
const canvasB = document.getElementById('canvasB');
const ctxA = canvasA.getContext('2d', { alpha: false, desynchronized: true });
const ctxB = canvasB.getContext('2d', { alpha: false, desynchronized: true });
const mjpegSrc = document.getElementById('mjpegSrc');
const badge = document.getElementById('streamBadge');

// Ottimizza canvas rendering
[ctxA, ctxB].forEach(ctx => {
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
});

// Pool di Image riutilizzabili (zero garbage collection)
const imgPool = [new Image(), new Image()];
let poolIdx = 0;
function getPooledImage() {
  poolIdx = (poolIdx + 1) % imgPool.length;
  const img = imgPool[poolIdx];
  img.onload = null;
  img.onerror = null;
  return img;
}

// =====================================================
// CANVAS ADAPTIVE STREAM ENGINE
//
// MJPEG mode:
//   <img> nascosto riceve stream MJPEG dal browser
//   requestAnimationFrame disegna img -> canvas a 60fps
//   Risultato: massima fluidita', zero DOM layout
//
// Snapshot mode (fallback):
//   Image pool carica /shot.jpg
//   createImageBitmap() decodifica JPEG off-thread
//   Draw diretto su canvas
//   Pipeline: prossimo frame parte subito dopo il draw
//
// Camera switch: crossfade CSS tra due canvas
// =====================================================
const Engine = {
  url: null,
  mode: null,           // 'mjpeg' | 'snapshot'
  active: 'A',          // canvas visibile
  rafId: null,          // requestAnimationFrame ID
  polling: false,
  timers: {},
  canvasW: 0, canvasH: 0,  // cache dimensioni per evitare resize

  canvas()  { return this.active === 'A' ? canvasA : canvasB; },
  ctx()     { return this.active === 'A' ? ctxA : ctxB; },
  nextCanvas() { return this.active === 'A' ? canvasB : canvasA; },
  nextCtx()    { return this.active === 'A' ? ctxB : ctxA; },
  snapUrl() { return this.url ? this.url.replace('/videofeed', '/shot.jpg') : null; },

  clearAll() {
    if (this.rafId) { cancelAnimationFrame(this.rafId); this.rafId = null; }
    Object.values(this.timers).forEach(t => clearTimeout(t));
    this.timers = {};
    this.polling = false;
    mjpegSrc.onload = null;
    mjpegSrc.onerror = null;
    mjpegSrc.removeAttribute('src');
  },

  setBadge(m) {
    badge.className = 'stream-badge ' + m;
    badge.textContent = m === 'mjpeg' ? 'MJPEG' : m === 'snapshot' ? 'SNAP' : 'OFF';
  },

  // Disegna immagine su canvas con resize intelligente
  drawFrame(ctx, canvas, source) {
    const w = source.naturalWidth || source.width;
    const h = source.naturalHeight || source.height;
    if (!w || !h) return;
    // Resize canvas solo se dimensioni cambiate
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
    }
    ctx.drawImage(source, 0, 0, w, h);
  },

  // === CROSSFADE tra canvas (cambio camera) ===
  crossfade() {
    const show = this.nextCanvas();
    const hide = this.canvas();
    show.style.transition = 'opacity 0.5s ease';
    hide.style.transition = 'opacity 0.5s ease';
    show.classList.add('visible');
    hide.classList.remove('visible');
    this.active = this.active === 'A' ? 'B' : 'A';
  },

  // === CONNECT: nuova camera ===
  connect(url) {
    if (this.url === url) return;
    this.clearAll();
    this.url = url;
    noSignal.style.display = 'none';
    this.tryMjpeg();
  },

  // === MJPEG MODE ===
  // img nascosto riceve lo stream, rAF loop disegna su canvas
  tryMjpeg() {
    this.mode = 'mjpeg';
    this.setBadge('mjpeg');
    let gotFirstFrame = false;

    mjpegSrc.onload = () => {
      if (gotFirstFrame) return;
      gotFirstFrame = true;
      clearTimeout(this.timers.mjpegTimeout);
      mjpegSrc.onload = null;
      // Primo frame: disegna su canvas nascosto, poi crossfade
      this.drawFrame(this.nextCtx(), this.nextCanvas(), mjpegSrc);
      this.crossfade();
      // Avvia il render loop a 60fps
      this.startMjpegLoop();
    };

    mjpegSrc.onerror = () => {
      if (gotFirstFrame) {
        // Stream caduto durante la trasmissione
        this.switchToSnapshot();
        return;
      }
      gotFirstFrame = true;
      clearTimeout(this.timers.mjpegTimeout);
      mjpegSrc.onload = null;
      mjpegSrc.onerror = null;
      this.switchToSnapshot();
    };

    mjpegSrc.src = this.url;

    // Se MJPEG non risponde in 5s -> snapshot
    this.timers.mjpegTimeout = setTimeout(() => {
      if (!gotFirstFrame) {
        gotFirstFrame = true;
        mjpegSrc.onload = null;
        mjpegSrc.onerror = null;
        mjpegSrc.removeAttribute('src');
        this.switchToSnapshot();
      }
    }, 5000);
  },

  // Loop MJPEG: disegna img -> canvas ogni frame del monitor
  startMjpegLoop() {
    const loop = () => {
      if (this.mode !== 'mjpeg') return;
      if (mjpegSrc.naturalWidth > 0) {
        this.drawFrame(this.ctx(), this.canvas(), mjpegSrc);
      }
      this.rafId = requestAnimationFrame(loop);
    };
    this.rafId = requestAnimationFrame(loop);
  },

  // === SNAPSHOT MODE (fallback) ===
  switchToSnapshot() {
    if (this.rafId) { cancelAnimationFrame(this.rafId); this.rafId = null; }
    mjpegSrc.removeAttribute('src');
    this.mode = 'snapshot';
    this.polling = true;
    this.setBadge('snapshot');
    this.pollFrame();

    // Ogni 30s riprova MJPEG
    this.timers.mjpegRetry = setInterval(() => {
      if (this.mode !== 'snapshot' || !this.url) return;
      const probe = new Image();
      probe.onload = () => {
        clearInterval(this.timers.mjpegRetry);
        this.polling = false;
        this.tryMjpeg();
      };
      probe.onerror = () => {};
      probe.src = this.url + '?probe=' + Date.now();
    }, 30000);
  },

  pollFrame() {
    if (!this.polling || !this.url) return;
    const img = getPooledImage();
    const src = this.snapUrl() + '?t=' + Date.now();

    img.onload = () => {
      img.onload = null;
      img.onerror = null;
      // Prova decodifica off-thread, fallback a draw diretto
      const doDraw = (source) => {
        this.drawFrame(this.ctx(), this.canvas(), source);
        if (source.close) source.close(); // chiudi ImageBitmap
        if (!this.canvas().classList.contains('visible')) {
          this.canvas().style.transition = 'none';
          this.canvas().classList.add('visible');
        }
        // Prossimo frame immediatamente
        if (this.polling) requestAnimationFrame(() => this.pollFrame());
      };

      if (typeof createImageBitmap === 'function') {
        createImageBitmap(img).then(doDraw).catch(() => doDraw(img));
      } else {
        doDraw(img);
      }
    };

    img.onerror = () => {
      img.onload = null;
      img.onerror = null;
      if (this.polling) this.timers.pollRetry = setTimeout(() => this.pollFrame(), 500);
    };

    img.src = src;
  },

  // === DISCONNECT ===
  disconnect() {
    this.clearAll();
    this.url = null;
    this.mode = null;
    canvasA.classList.remove('visible');
    canvasB.classList.remove('visible');
    noSignal.style.display = 'flex';
    this.setBadge('offline');
  }
};

// Ascolta camera attiva dalla regia
onValue(ref(db, 'ark_regia/activeCamera'), (snap) => {
  const data = snap.val();
  if (data && data.url) {
    Engine.connect(data.url.split('?')[0]);
  } else {
    Engine.disconnect();
  }
});

// ===== OVERLAY TOGGLE =====
onValue(ref(db, 'ark_regia/showOverlay'), (snap) => {
  const show = snap.val();
  if (show) {
    overlayEl.classList.remove('hidden');
  } else {
    overlayEl.classList.add('hidden');
  }
});

// ===== TIMER =====
let serverTimeOffset = 0;
onValue(ref(db, '.info/serverTimeOffset'), (snap) => {
  serverTimeOffset = snap.val() || 0;
});

function getSyncedTime() {
  return Date.now() + serverTimeOffset;
}

const timerEl = document.getElementById('timer');
const timerLabelEl = document.getElementById('timerLabel');
const wodNameEl = document.getElementById('wodName');

let timerInterval = null;

onValue(ref(db, 'ark_timer'), (snap) => {
  const timer = snap.val();
  
  if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
  }
  
  if (!timer || timer.status === 'stopped') {
    timerEl.textContent = '00:00';
    timerEl.className = 'timer stopped';
    timerLabelEl.textContent = '🐾 ARK GAMES 2026';
    wodNameEl.textContent = 'In attesa...';
    return;
  }
  
  wodNameEl.textContent = timer.wodName || 'Workout';
  
  function updateTimer() {
    const now = getSyncedTime();
    
    if (timer.status === 'countdown') {
      const remaining = Math.ceil((timer.startAt - now) / 1000);
      if (remaining <= 0) {
        timerEl.textContent = 'GO!';
        timerEl.className = 'timer running';
      } else {
        timerEl.textContent = remaining;
        timerEl.className = 'timer countdown';
        timerLabelEl.textContent = 'PRONTI...';
      }
    } else if (timer.status === 'running') {
      const elapsed = Math.floor((now - timer.startAt) / 1000);
      const capSeconds = (timer.cap || 10) * 60;
      
      if (elapsed >= capSeconds) {
        timerEl.textContent = 'TIME CAP!';
        timerEl.className = 'timer timecap';
        timerLabelEl.textContent = formatTime(capSeconds);
      } else {
        timerEl.textContent = formatTime(elapsed);
        timerEl.className = 'timer running';
        timerLabelEl.textContent = `CAP: ${timer.cap || 10} min`;
      }
    }
  }
  
  updateTimer();
  timerInterval = setInterval(updateTimer, 100);
});

// ===== LANE ATHLETES =====
function extractEmoji(name) {
  if (!name) return '🐾';
  const match = name.match(/[\u{1F300}-\u{1F9FF}]|[\u{2600}-\u{26FF}]/u);
  return match ? match[0] : '🐾';
}

function extractTeamName(name) {
  if (!name) return '-';
  return name.replace(/[\u{1F300}-\u{1F9FF}]|[\u{2600}-\u{26FF}]/gu, '').trim();
}

onValue(ref(db, 'ark_timer/laneAthletes'), (snap) => {
  const athletes = snap.val() || [];
  
  for (let i = 1; i <= 3; i++) {
    const athlete = athletes[i];
    const emojiEl = document.getElementById(`emoji${i}`);
    const teamEl = document.getElementById(`team${i}`);
    const cardEl = document.getElementById(`lane${i}`);
    
    if (athlete && athlete.teamName) {
      emojiEl.textContent = extractEmoji(athlete.teamName);
      teamEl.textContent = extractTeamName(athlete.teamName);
      cardEl.classList.add('active');
    } else {
      emojiEl.textContent = '🐾';
      teamEl.textContent = '-';
      cardEl.classList.remove('active');
    }
  }
});

// ===== LIVE SCORES =====
onValue(ref(db, 'ark_timer/liveScores'), (snap) => {
  const scores = snap.val() || {};
  
  for (let i = 1; i <= 3; i++) {
    const scoreEl = document.getElementById(`score${i}`);
    const laneScore = scores[i];
    
    if (laneScore && laneScore.reps !== undefined) {
      scoreEl.textContent = laneScore.reps + ' REP';
      scoreEl.style.transform = 'scale(1.3)';
      setTimeout(() => scoreEl.style.transform = 'scale(1)', 150);
    } else {
      scoreEl.textContent = '';
    }
  }
});

function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
}
</script>
</body>
</html>
